spring.application.name=document-api

server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

magalu.object-storage.endpoint=${MAGALU_OBJECT_STORAGE_ENDPOINT}
magalu.object-storage.region=${MAGALU_OBJECT_STORAGE_REGION}
magalu.object-storage.bucket=${MAGALU_OBJECT_STORAGE_BUCKET}
magalu.object-storage.access-key=${MAGALU_OBJECT_STORAGE_ACCESS_KEY}
magalu.object-storage.secret-key=${MAGALU_OBJECT_STORAGE_SECRET_KEY}