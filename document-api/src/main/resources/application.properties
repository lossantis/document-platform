spring.application.name=document-api

server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

magalu.object-storage.endpoint=${MAGALU_OBJECT_STORAGE_ENDPOINT}
magalu.object-storage.region=${MAGALU_OBJECT_STORAGE_REGION}
magalu.object-storage.bucket=${MAGALU_OBJECT_STORAGE_BUCKET}
magalu.object-storage.access-key=${MAGALU_OBJECT_STORAGE_ACCESS_KEY}
magalu.object-storage.secret-key=${MAGALU_OBJECT_STORAGE_SECRET_KEY}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties[spring.json.add.type.headers]=false
app.kafka.topics.document-uploaded=document.uploaded.v1

spring.kafka.consumer.group-id=document-api

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.auto-offset-reset=earliest

app.kafka.topics.document-processed=document.processed.v1