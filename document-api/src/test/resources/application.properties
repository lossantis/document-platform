spring.application.name=document-api-test

spring.datasource.url=jdbc:h2:mem:documentdb
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=false

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=document-api-test
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties[spring.json.add.type.headers]=false

app.kafka.topics.document-uploaded=document.uploaded.v1
app.kafka.topics.document-processed=document.processed.v1

magalu.object-storage.endpoint=http://localhost:9000
magalu.object-storage.region=br-se1
magalu.object-storage.bucket=test-bucket
magalu.object-storage.access-key=test-access-key
magalu.object-storage.secret-key=test-secret-key

spring.kafka.listener.auto-startup=false